syntax = "proto3";

option csharp_namespace = "IronLedger.Contracts.Athletes";

package ironledger.athletes;
import "common.proto";

service AthleteService {
  rpc CreateAthlete(CreateAthleteRequest) returns (CreateAthleteResponse);
  rpc GetAthlete(GetAthleteRequest) returns (GetAthleteResponse);
  rpc GetAthletesByIds(GetAthletesByIdsRequest) returns (GetAthletesByIdsResponse);
  rpc ListAthletes(ListAthletesRequest) returns (ListAthletesResponse);
  rpc UpdateAthlete(UpdateAthleteRequest) returns (UpdateAthleteResponse);
  rpc ArchiveAthlete(ArchiveAthleteRequest) returns (ArchiveAthleteResponse);
  rpc RestoreAthlete(RestoreAthleteRequest) returns (RestoreAthleteResponse);
}

message AthleteMessage {
  string athlete_id = 1;
  string name = 2;
  double body_weight_kg = 3;
  ironledger.common.Date date_of_birth = 4;
  ironledger.common.Sex sex = 5;
  string team = 6;
  bool is_archived = 7;
}

message CreateAthleteRequest {
  string name = 1;
  double body_weight_kg = 2;
  ironledger.common.Sex sex = 3;
  string team = 4;
  ironledger.common.Date date_of_birth = 5;
}

message CreateAthleteResponse {
  AthleteMessage athlete = 1;
}

message GetAthleteRequest {
  string athlete_id = 1;
}

message GetAthleteResponse {
  AthleteMessage athlete = 1;
}

message GetAthletesByIdsRequest {
  repeated string athlete_ids = 1;
}

message GetAthletesByIdsResponse {
  repeated AthleteMessage athletes = 1;
}

message ListAthletesRequest {
  int32 page_size = 1;
  string page_token = 2;
  string name_search = 3;
}

message ListAthletesResponse {
  repeated AthleteMessage athletes = 1;
  string next_page_token = 2;
}

message UpdateAthleteRequest {
  string athlete_id = 1;
  string name = 2;
  double body_weight_kg = 3;
  ironledger.common.Sex sex = 4;
  string team = 5;
  ironledger.common.Date date_of_birth = 6;
}

message UpdateAthleteResponse {
  AthleteMessage athlete = 1;
}

message ArchiveAthleteRequest {
  string athlete_id = 1;
}

message ArchiveAthleteResponse {
  bool success = 1;
  bool already_archived = 2;
}

message RestoreAthleteRequest {
  string athlete_id = 1;
}

message RestoreAthleteResponse {
  bool success = 1;
  bool already_active = 2;
}
